name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}

      - name: Generate proto (Go + Python)
        run: make proto

      - name: Agent build / vet / test
        run: |
          cd agent
          go build ./...
          go vet ./...
          go test ./...

      - name: CLI build / vet
        run: |
          cd cli
          go build ./...
          go vet ./...

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Control-plane deps + pytest
        run: |
          cd control-plane
          python -m pip install -U pip
          pip install -e ".[test]"
          pytest -q
