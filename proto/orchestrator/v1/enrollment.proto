syntax = "proto3";

// 등록 계약. 등록은 cert 이전 1회라 REST(FastAPI) POST /v1/enroll 로 처리한다 (gRPC 아님).
// 이 파일은 요청/응답 형상의 단일 기준(문서)이며, 실제 전송은 JSON.
// 설계: docs/design/02-enrollment-security.md
package orchestrator.v1;

option go_package = "github.com/xgen/orchestrator/agent/gen/orchestrator/v1;orchestratorv1";

message EnrollRequest {
  string join_token = 1;
  bytes csr = 2; // CN=node, machine-id 포함. private key는 노드 밖으로 안 나감
  NodeInfo node_info = 3;
}

message NodeInfo {
  string hostname = 1;
  string machine_id = 2;
  string os = 3;
  string arch = 4;
}

message EnrollResponse {
  string node_id = 1;
  bytes client_cert = 2; // CA가 서명, SAN=spiffe://xgen/node/<node_id>
  bytes ca_bundle = 3;
}
